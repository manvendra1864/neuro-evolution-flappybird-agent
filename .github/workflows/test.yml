name: Test My Project

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install Requirements
        run: pip install -r requirements.txt
      - name: Run Tests
        run: python -m pytest tests/
